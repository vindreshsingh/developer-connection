# LiveKit SFU — local development server
#
# Usage:
#   docker compose -f docker-compose.livekit.yml up -d
#
# Then add to backend/.env:
#   LIVEKIT_API_KEY=devkey
#   LIVEKIT_API_SECRET=devsecret0000000000000000000000
#
# LiveKit dashboard (optional):  http://localhost:7880
# WebRTC port range:             TCP/UDP 7881, UDP 50000-60000
#
# The livekit.yaml below configures:
#   - API key + secret matching the env vars above
#   - STUN turned off (use host networking for local dev — no NAT traversal needed)
#   - Log level: info

services:
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --config /etc/livekit/livekit.yaml
    ports:
      - "7880:7880"       # HTTP API + dashboard
      - "7881:7881"       # WebRTC TCP
      - "7881:7881/udp"   # WebRTC UDP
      - "50000-50020:50000-50020/udp"  # ICE port range (narrow range for dev)
    volumes:
      - ./livekit.dev.yaml:/etc/livekit/livekit.yaml:ro
    restart: unless-stopped
