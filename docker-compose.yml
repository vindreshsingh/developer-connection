# Local development infrastructure — Phase 10.
#
# Brings up Redis, which backs caching, distributed rate-limiting, the
# Socket.IO adapter, the presence registry, and the BullMQ event queues.
#
# Usage:
#   docker compose up -d
#
# Then add to backend/.env:
#   REDIS_URL=redis://localhost:6379
#
# Without REDIS_URL the backend still runs (single-instance, in-memory
# fallbacks) — Redis only unlocks the distributed/event-driven behavior.

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
