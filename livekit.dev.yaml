# LiveKit server config — local development only
# Matches docker-compose.livekit.yml

port: 7880

rtc:
  tcp_port: 7881
  udp_port: 7881
  port_range_start: 50000
  port_range_end: 50020
  use_external_ip: false

keys:
  devkey: devsecret0000000000000000000000

logging:
  level: info

# Disable TURN for local dev (peers are on the same machine / LAN)
turn:
  enabled: false
