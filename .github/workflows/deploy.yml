# CD workflow → AWS
#
# Triggered after CI succeeds on `master`. Builds the frontend and syncs it to
# S3 + invalidates CloudFront. The backend has been removed from this repo (all
# APIs now live in the developer-connection-microservices stack), so this
# workflow deploys the frontend only.
#
# Required repo configuration:
#
#   Secrets:
#     AWS_DEPLOY_ROLE_ARN        — IAM role ARN assumed via GitHub OIDC
#                                   (no long-lived AWS keys are stored)
#
#   Variables:
#     AWS_REGION                 — e.g. ap-south-1
#     S3_BUCKET_FRONTEND         — S3 bucket serving the frontend static assets
#     CLOUDFRONT_DISTRIBUTION_ID — CloudFront distribution in front of the bucket

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    name: Deploy frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync frontend/dist "s3://${{ vars.S3_BUCKET_FRONTEND }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
